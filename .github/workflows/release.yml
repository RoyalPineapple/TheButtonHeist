name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      HAS_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}

    steps:
      - name: Verify CI passed on exact release commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_SHA=$(gh api repos/${{ github.repository }}/git/ref/tags/${{ github.event.inputs.tag || github.ref_name }} --jq '.object.sha' 2>/dev/null \
            || echo "${{ github.sha }}")
          COUNT=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow CI \
            --branch main \
            --commit "$TAG_SHA" \
            --limit 20 \
            --json conclusion,event,status \
            --jq '[.[] | select(.event == "push" and .status == "completed" and .conclusion == "success")] | length')
          if [[ "$COUNT" -gt 0 ]]; then
            echo "CI verified green on exact release commit ${TAG_SHA:0:8}"
            exit 0
          fi
          echo "::group::CI runs found for ${TAG_SHA:0:8}"
          gh run list \
            --repo ${{ github.repository }} \
            --workflow CI \
            --branch main \
            --commit "$TAG_SHA" \
            --limit 20 || true
          echo "::endgroup::"
          echo "::error::No successful main-branch CI push run found for exact tagged commit $TAG_SHA. Push the release commit to main, wait for CI to pass, then push or re-run the tag release."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          submodules: recursive

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version consistency
        run: |
          source scripts/release-contract.sh
          TAG_VERSION="${{ steps.version.outputs.version }}"
          FILE_VERSION=$(tr -d '[:space:]' < "$BUTTONHEIST_RELEASE_VERSION_FILE")
          CODE_VERSION=$(grep -o 'buttonHeistVersion = "[^"]*"' \
            "$BUTTONHEIST_CODE_VERSION_FILE" | cut -d'"' -f2)
          TAG_SHA=$(git rev-parse "v${TAG_VERSION}^{}")
          HEAD_SHA=$(git rev-parse HEAD)

          if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) != $BUTTONHEIST_RELEASE_VERSION_FILE ($FILE_VERSION)"
            exit 1
          fi
          if [[ "$TAG_VERSION" != "$CODE_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) != buttonHeistVersion ($CODE_VERSION)"
            exit 1
          fi
          if [[ "$TAG_SHA" != "$HEAD_SHA" ]]; then
            echo "::error::Checked-out HEAD ($HEAD_SHA) is not tag v${TAG_VERSION} ($TAG_SHA)"
            exit 1
          fi
          scripts/validate-release-contract.sh
          echo "Version $TAG_VERSION verified across tag, release contract, and source."

      - name: Build CLI (universal)
        run: |
          cd ButtonHeistCLI
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          lipo -create \
            .build/arm64-apple-macosx/release/buttonheist \
            .build/x86_64-apple-macosx/release/buttonheist \
            -output .build/buttonheist
          file .build/buttonheist

      - name: Build MCP server (universal)
        run: |
          cd ButtonHeistMCP
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          lipo -create \
            .build/arm64-apple-macosx/release/buttonheist-mcp \
            .build/x86_64-apple-macosx/release/buttonheist-mcp \
            -output .build/buttonheist-mcp
          file .build/buttonheist-mcp

      - name: Build heist-plan compiler artifacts (arm64)
        run: |
          swift build -c release --arch arm64 --product heist-plan \
            -Xswiftc -enable-library-evolution \
            -Xswiftc -emit-module-interface
          test -x .build/arm64-apple-macosx/release/heist-plan
          test -f .build/arm64-apple-macosx/release/Modules/ThePlans.swiftmodule
          test -f .build/arm64-apple-macosx/release/ThePlans.build/ThePlans.swiftinterface
          test -f .build/arm64-apple-macosx/release/description.json
          find .build/arm64-apple-macosx/release/ThePlans.build -name '*.swift.o' -print -quit | grep -q .

      - name: Install Tuist
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4

      - name: Build BH Demo for iOS Simulator
        run: |
          set -eo pipefail
          tuist install
          BUTTONHEIST_TUIST_SKIP_AUTO_CLEAN=1 tuist generate --no-binary-cache --no-open
          ./scripts/clean-generated-projects.sh

          read -r SIM_UDID SIM_OS < <(python3 - <<'PYEOF'
          import json
          import subprocess

          devices = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"]))["devices"]
          runtimes = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "runtimes", "-j"]))["runtimes"]
          preferred = []
          fallback = []
          for rt in sorted(runtimes, key=lambda r: r["version"], reverse=True):
              if rt["platform"] != "iOS" or not rt["isAvailable"]:
                  continue
              for dev in devices.get(rt["identifier"], []):
                  if not dev["isAvailable"]:
                      continue
                  target = (dev["udid"], rt["version"])
                  if dev["name"] == "iPhone 16 Pro":
                      preferred.append(target)
                  elif "iPhone" in dev["name"]:
                      fallback.append(target)
          candidates = preferred or fallback
          if not candidates:
              raise SystemExit("No available iPhone simulator found")
          print(*candidates[0])
          PYEOF
          )
          DERIVED_DATA_PATH="$RUNNER_TEMP/ButtonHeistDerivedData"
          DEST="platform=iOS Simulator,id=$SIM_UDID"
          echo "Building BH Demo for $DEST (iOS $SIM_OS)"
          xcodebuild -workspace ButtonHeist.xcworkspace -scheme "BH Demo" \
            -destination "$DEST" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            build

          APP_PATH="$DERIVED_DATA_PATH/Build/Products/Debug-iphonesimulator/BHDemo.app"
          if [[ ! -d "$APP_PATH" || ! -f "$APP_PATH/Info.plist" || ! -x "$APP_PATH/BHDemo" ]]; then
            echo "::error::BH Demo build produced an incomplete app at $APP_PATH"
            find "$DERIVED_DATA_PATH/Build/Products/Debug-iphonesimulator" -maxdepth 3 -print || true
            exit 1
          fi
          APP_SIZE_KB=$(du -sk "$APP_PATH" | awk '{print $1}')
          if [[ "$APP_SIZE_KB" -lt 1024 ]]; then
            echo "::error::BH Demo app is unexpectedly small (${APP_SIZE_KB}KB): $APP_PATH"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "SIM_UDID=$SIM_UDID" >> "$GITHUB_ENV"
          echo "Built: $APP_PATH (${APP_SIZE_KB}KB)"

      - name: Package binaries and scripts
        run: |
          source scripts/release-contract.sh
          VERSION="${{ steps.version.outputs.version }}"
          CLI_ARCHIVE=$(buttonheist_cli_archive_name "$VERSION")
          MCP_ARCHIVE=$(buttonheist_mcp_archive_name "$VERSION")
          DEMO_ARCHIVE=$(buttonheist_demo_archive_name "$VERSION")
          mkdir -p dist

          # CLI + compiler artifacts
          cp ButtonHeistCLI/.build/buttonheist dist/
          cp .build/arm64-apple-macosx/release/heist-plan dist/
          mkdir -p dist/ThePlans/arm64-apple-macosx/release/Modules
          cp -R \
            .build/arm64-apple-macosx/release/ThePlans.build \
            dist/ThePlans/arm64-apple-macosx/release/
          cp \
            .build/arm64-apple-macosx/release/ThePlans.build/ThePlans.swiftinterface \
            .build/arm64-apple-macosx/release/ThePlans.build/ThePlans.private.swiftinterface \
            dist/ThePlans/arm64-apple-macosx/release/Modules/
          cp .build/arm64-apple-macosx/release/description.json \
            dist/ThePlans/arm64-apple-macosx/release/
          tar -czf "dist/${CLI_ARCHIVE}" -C dist buttonheist heist-plan ThePlans
          rm dist/buttonheist
          rm dist/heist-plan
          rm -rf dist/ThePlans

          # MCP
          cp ButtonHeistMCP/.build/buttonheist-mcp dist/
          tar -czf "dist/${MCP_ARCHIVE}" -C dist buttonheist-mcp
          rm dist/buttonheist-mcp

          # Simulator app
          if [[ ! -d "$APP_PATH" || ! -f "$APP_PATH/Info.plist" || ! -x "$APP_PATH/BHDemo" ]]; then
            echo "::error::Refusing to package incomplete BH Demo app at $APP_PATH"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/${DEMO_ARCHIVE}"
          if ! unzip -l "dist/${DEMO_ARCHIVE}" | grep -q 'BHDemo.app/BHDemo'; then
            echo "::error::BH Demo archive is missing the app executable"
            exit 1
          fi

          # Checksums
          cd dist
          shasum -a 256 *.tar.gz *.zip > checksums.txt
          cat checksums.txt

      - name: Smoke staged release artifacts
        run: |
          source scripts/release-contract.sh
          VERSION="${{ steps.version.outputs.version }}"
          scripts/installed-artifact-smoke.sh \
            --cli-archive "dist/$(buttonheist_cli_archive_name "$VERSION")" \
            --mcp-archive "dist/$(buttonheist_mcp_archive_name "$VERSION")" \
            --expected-version "$VERSION" \
            --require-installed

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source scripts/release-contract.sh
          VERSION="${{ steps.version.outputs.version }}"
          PARSER_TAG=$(grep 'AccessibilitySnapshotBH' Package.swift | grep -oE 'exact: "[0-9]+\.[0-9]+\.[0-9]+"' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          PARSER_SHA=$(git ls-tree HEAD submodules/AccessibilitySnapshotBH | awk '{print $3}' | cut -c1-12)
          RELEASE_NOTES=$(mktemp)
          cat > "$RELEASE_NOTES" <<EOF
          Parser contract:
          - AccessibilitySnapshotBH: ${PARSER_TAG} (${PARSER_SHA})
          EOF
          gh release create "v${VERSION}" \
            --title "Button Heist ${VERSION}" \
            --generate-notes \
            --notes-file "$RELEASE_NOTES" \
            --verify-tag \
            "dist/$(buttonheist_cli_archive_name "$VERSION")" \
            "dist/$(buttonheist_mcp_archive_name "$VERSION")" \
            "dist/$(buttonheist_demo_archive_name "$VERSION")" \
            dist/checksums.txt

      - name: Update Homebrew tap
        if: env.HAS_TAP_TOKEN == 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          source scripts/release-contract.sh
          VERSION="${{ steps.version.outputs.version }}"
          CLI_ARCHIVE=$(buttonheist_cli_archive_name "$VERSION")
          MCP_ARCHIVE=$(buttonheist_mcp_archive_name "$VERSION")

          # Extract checksums
          CLI_SHA=$(grep -F "$CLI_ARCHIVE" dist/checksums.txt | awk '{print $1}')
          MCP_SHA=$(grep -F "$MCP_ARCHIVE" dist/checksums.txt | awk '{print $1}')

          # Generate formula from the checked-in template and release contract.
          scripts/render-homebrew-formula.sh "$VERSION" "$CLI_SHA" "$MCP_SHA" /tmp/buttonheist-final.rb

          # Push to tap repo
          TAP_REPO="$BUTTONHEIST_TAP_REPO"
          EXISTING_SHA=$(gh api "repos/${TAP_REPO}/contents/Formula/buttonheist.rb" --jq '.sha' 2>/dev/null || true)
          SHA_ARG=()
          if [[ -n "$EXISTING_SHA" ]]; then
            SHA_ARG=(--field "sha=${EXISTING_SHA}")
          fi
          gh api "repos/${TAP_REPO}/contents/Formula/buttonheist.rb" \
            --method PUT \
            --field message="Update buttonheist to ${VERSION}" \
            --field content="$(base64 -b 0 < /tmp/buttonheist-final.rb)" \
            "${SHA_ARG[@]}" \
            || echo "::warning::Failed to update Homebrew tap — create RoyalPineapple/homebrew-tap and add HOMEBREW_TAP_TOKEN secret"
