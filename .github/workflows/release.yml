name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2026.04.03)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      HAS_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          submodules: recursive

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version consistency
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          FILE_VERSION=$(cat RELEASE_VERSION)
          CODE_VERSION=$(grep -o 'buttonHeistVersion = "[^"]*"' \
            ButtonHeist/Sources/TheScore/Messages.swift | cut -d'"' -f2)

          if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) != VERSION file ($FILE_VERSION)"
            exit 1
          fi
          if [[ "$TAG_VERSION" != "$CODE_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) != buttonHeistVersion ($CODE_VERSION)"
            exit 1
          fi
          echo "Version $TAG_VERSION verified across tag, VERSION, and source."

      - name: Build CLI (universal)
        run: |
          cd ButtonHeistCLI
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          lipo -create \
            .build/arm64-apple-macosx/release/buttonheist \
            .build/x86_64-apple-macosx/release/buttonheist \
            -output .build/buttonheist
          file .build/buttonheist

      - name: Build MCP server (universal)
        run: |
          cd ButtonHeistMCP
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          lipo -create \
            .build/arm64-apple-macosx/release/buttonheist-mcp \
            .build/x86_64-apple-macosx/release/buttonheist-mcp \
            -output .build/buttonheist-mcp
          file .build/buttonheist-mcp

      - name: Install Tuist
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4

      - name: Build BH Demo for iOS Simulator
        run: |
          tuist install
          tuist generate --no-binary-cache --no-open
          xcodebuild -workspace ButtonHeist.xcworkspace -scheme "BH Demo" \
            -destination "generic/platform=iOS Simulator" \
            build | tail -5
          APP_PATH=$(ls -td ~/Library/Developer/Xcode/DerivedData/ButtonHeist*/Build/Products/Debug-iphonesimulator/BH\ Demo.app | head -1)
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Built: $APP_PATH"

      - name: Collect TheInsideJob frameworks
        run: |
          PRODUCTS_DIR=$(dirname "$APP_PATH")
          mkdir -p dist/ButtonHeistFrameworks
          FRAMEWORKS=(
            TheInsideJob TheScore
            AccessibilitySnapshotParser AccessibilitySnapshotParser_ObjC
            X509 Crypto SwiftASN1
            CCryptoBoringSSL CCryptoBoringSSLShims CryptoBoringWrapper
            _CertificateInternals _CryptoExtras
          )
          for fw in "${FRAMEWORKS[@]}"; do
            cp -R "${PRODUCTS_DIR}/${fw}.framework" dist/ButtonHeistFrameworks/
          done
          echo "Collected $(ls dist/ButtonHeistFrameworks | wc -l | tr -d ' ') frameworks"

      - name: Package binaries and scripts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist

          # CLI + frameworks (integrate command expects ButtonHeistFrameworks/ next to binary)
          cp ButtonHeistCLI/.build/buttonheist dist/
          tar -czf "dist/buttonheist-${VERSION}-macos.tar.gz" -C dist buttonheist ButtonHeistFrameworks
          rm dist/buttonheist

          # MCP
          cp ButtonHeistMCP/.build/buttonheist-mcp dist/
          tar -czf "dist/buttonheist-mcp-${VERSION}-macos.tar.gz" -C dist buttonheist-mcp
          rm dist/buttonheist-mcp

          # Simulator app
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/bh-demo-${VERSION}-iphonesimulator.zip"

          # Checksums
          cd dist
          shasum -a 256 *.tar.gz *.zip > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "Button Heist ${VERSION}" \
            --generate-notes \
            dist/buttonheist-${VERSION}-macos.tar.gz \
            dist/buttonheist-mcp-${VERSION}-macos.tar.gz \
            dist/bh-demo-${VERSION}-iphonesimulator.zip \
            dist/checksums.txt

      - name: Update Homebrew tap
        if: env.HAS_TAP_TOKEN == 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Extract checksums
          CLI_SHA=$(grep "buttonheist-${VERSION}-macos.tar.gz" dist/checksums.txt | awk '{print $1}')
          MCP_SHA=$(grep "buttonheist-mcp-${VERSION}-macos.tar.gz" dist/checksums.txt | awk '{print $1}')

          # Generate formula with hardcoded version and SHA-256 values
          RELEASE_URL="https://github.com/RoyalPineapple/TheButtonHeist/releases/download/v${VERSION}"
          cat > /tmp/buttonheist-final.rb << FORMULA
          class Buttonheist < Formula
            desc "Give AI agents full programmatic control of iOS apps"
            homepage "https://github.com/RoyalPineapple/TheButtonHeist"
            version "${VERSION}"

            url "${RELEASE_URL}/buttonheist-${VERSION}-macos.tar.gz"
            sha256 "${CLI_SHA}"

            resource "mcp" do
              url "${RELEASE_URL}/buttonheist-mcp-${VERSION}-macos.tar.gz"
              sha256 "${MCP_SHA}"
            end

            depends_on :macos
            depends_on macos: :sonoma

            def install
              bin.install "buttonheist"
              bin.install "ButtonHeistFrameworks" if (buildpath/"ButtonHeistFrameworks").exist?
              resource("mcp").stage { bin.install "buttonheist-mcp" }
            end

            def caveats
              <<~EOS
                To integrate Button Heist into your iOS app:

                  cd /path/to/your-ios-project
                  buttonheist integrate

                MCP server is installed at:
                  #{opt_bin}/buttonheist-mcp

                Add to your project's .mcp.json:
                  {
                    "mcpServers": {
                      "buttonheist": {
                        "command": "#{opt_bin}/buttonheist-mcp",
                        "args": []
                      }
                    }
                  }
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/buttonheist --version")
            end
          end
          FORMULA
          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' /tmp/buttonheist-final.rb

          # Push to tap repo
          TAP_REPO="RoyalPineapple/homebrew-tap"
          EXISTING_SHA=$(gh api "repos/${TAP_REPO}/contents/Formula/buttonheist.rb" --jq '.sha' 2>/dev/null || true)
          SHA_ARG=()
          if [[ -n "$EXISTING_SHA" ]]; then
            SHA_ARG=(--field "sha=${EXISTING_SHA}")
          fi
          gh api "repos/${TAP_REPO}/contents/Formula/buttonheist.rb" \
            --method PUT \
            --field message="Update buttonheist to ${VERSION}" \
            --field content="$(base64 -b 0 < /tmp/buttonheist-final.rb)" \
            "${SHA_ARG[@]}" \
            || echo "::warning::Failed to update Homebrew tap — create RoyalPineapple/homebrew-tap and add HOMEBREW_TAP_TOKEN secret"
