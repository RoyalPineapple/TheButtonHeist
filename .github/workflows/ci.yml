name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swiftlint:
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict

  macos-tests:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Init required submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive AccessibilitySnapshot

      - name: Install Tuist
        uses: jdx/mise-action@v2

      - name: Cache Tuist dependencies
        uses: actions/cache@v4
        with:
          path: Tuist/.build
          key: ${{ runner.os }}-tuist-${{ hashFiles('Tuist/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-tuist-

      - name: Install Tuist dependencies
        run: tuist install

      - name: Verify generated project is up to date
        run: |
          tuist generate
          git diff --exit-code || {
            echo "::error::Generated Xcode project is out of date. Run 'tuist generate' and commit the changes."
            exit 1
          }

      - name: Run macOS tests
        run: |
          set -eo pipefail
          tuist test TheScoreTests --no-selective-testing
          tuist test ButtonHeistTests --no-selective-testing

  ios-tests:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Init required submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive AccessibilitySnapshot

      - name: Install Tuist
        uses: jdx/mise-action@v2

      - name: Cache Tuist dependencies
        uses: actions/cache@v4
        with:
          path: Tuist/.build
          key: ${{ runner.os }}-tuist-${{ hashFiles('Tuist/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-tuist-

      - name: Install Tuist dependencies
        run: tuist install

      - name: Run iOS tests
        run: |
          set -eo pipefail
          tuist test TheInsideJobTests --platform ios --device "iPhone 16 Pro" --os 18.5 --no-selective-testing
