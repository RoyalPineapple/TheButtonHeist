name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swiftlint:
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict

  wire-format-bump:
    # Fails fast when wire-format files (ServerMessages/ClientMessages/
    # Messages/Elements) are touched without bumping buttonHeistVersion.
    # See scripts/check-wire-format-bump.sh.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify wire-format change is paired with version bump
        run: |
          set -eo pipefail
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          scripts/check-wire-format-bump.sh "origin/${{ github.event.pull_request.base.ref }}"

  submodule-pin:
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify AccessibilitySnapshotBH pin is tip of main branch
        run: |
          set -eo pipefail
          SUBMODULE_SHA=$(git ls-tree HEAD submodules/AccessibilitySnapshotBH | awk '{print $3}')
          BRANCH_TIP=$(git ls-remote https://github.com/RoyalPineapple/AccessibilitySnapshotBH refs/heads/main | awk '{print $1}')

          echo "Submodule pin:  $SUBMODULE_SHA"
          echo "Branch tip:     $BRANCH_TIP"

          FAILED=0
          if [ "$SUBMODULE_SHA" != "$BRANCH_TIP" ]; then
            echo "::error::Submodule ($SUBMODULE_SHA) is behind main branch tip ($BRANCH_TIP). Run: git submodule update --remote submodules/AccessibilitySnapshotBH"
            FAILED=1
          fi

          # If Package.swift uses a revision pin, verify it matches the submodule
          PACKAGE_SHA=$(grep -oE 'revision: "[0-9a-f]+"' Package.swift | grep -oE '[0-9a-f]{40}' || true)
          if [ -n "$PACKAGE_SHA" ]; then
            echo "Package.swift:  $PACKAGE_SHA"
            if [ "$PACKAGE_SHA" != "$SUBMODULE_SHA" ]; then
              echo "::error::Package.swift revision ($PACKAGE_SHA) does not match submodule ($SUBMODULE_SHA). Update the revision pin in Package.swift."
              FAILED=1
            fi
          fi
          exit $FAILED

  spm-package:
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Resolve SPM dependencies
        timeout-minutes: 5
        run: swift package resolve

      - name: Build TheScore
        timeout-minutes: 5
        run: swift build --target TheScore

      - name: Build ButtonHeist
        timeout-minutes: 5
        run: swift build --target ButtonHeist

  macos-tests:
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Init required submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive submodules/AccessibilitySnapshotBH

      - name: Install Tuist
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4

      - name: Cache Tuist dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: Tuist/.build
          key: ${{ runner.os }}-tuist-deps-${{ hashFiles('Tuist/Package.swift', 'Tuist/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-tuist-deps-

      - name: Install Tuist dependencies
        timeout-minutes: 5
        run: tuist install

      - name: Verify generated project is up to date
        timeout-minutes: 3
        run: |
          tuist generate --no-binary-cache --no-open
          # Strip the same noise scripts/generate-project.sh strips locally
          # (duplicate $(inherited), hardcoded SRCROOT) so the committed
          # pbxproj matches what contributors check in via the wrapper.
          find . -name 'project.pbxproj' \
            -not -path './Tuist/.build/*' \
            -not -path './submodules/*' \
            -not -path './.context/*' \
            -print0 | xargs -0 python3 scripts/clean-pbxproj.py
          git diff --exit-code -- '*.pbxproj' '*.xcworkspacedata' || {
            echo "::error::Generated Xcode project is out of date. Run 'scripts/generate-project.sh' and commit the changes."
            echo "::group::Diff"
            git diff -- '*.pbxproj' '*.xcworkspacedata'
            echo "::endgroup::"
            exit 1
          }

      - name: Run TheScoreTests
        timeout-minutes: 5
        run: tuist test TheScoreTests --no-selective-testing

      - name: Run ButtonHeistTests
        timeout-minutes: 5
        run: |
          set -eo pipefail
          xcodebuild test -workspace ButtonHeist.xcworkspace -scheme ButtonHeistTests \
            -destination 'platform=macOS'

      - name: Build & test CLI (SwiftPM)
        timeout-minutes: 5
        run: |
          cd ButtonHeistCLI
          swift package resolve
          swift build
          swift test

      - name: Build & test MCP (SwiftPM)
        timeout-minutes: 5
        run: |
          cd ButtonHeistMCP
          swift package resolve
          swift build
          swift test

  ios-tests:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Boot simulator in background
        run: |
          set -eo pipefail
          read -r SIM_UDID SIM_OS < <(python3 << 'PYEOF'
          import subprocess, json
          runtimes = json.loads(subprocess.check_output(
              ["xcrun", "simctl", "list", "runtimes", "-j"]))["runtimes"]
          devices = json.loads(subprocess.check_output(
              ["xcrun", "simctl", "list", "devices", "available", "-j"]))["devices"]
          for rt in sorted(runtimes, key=lambda r: r["version"], reverse=True):
              if rt["platform"] != "iOS" or not rt["isAvailable"]:
                  continue
              for dev in devices.get(rt["identifier"], []):
                  if dev["name"] == "iPhone 16 Pro" and dev["isAvailable"]:
                      print(dev["udid"], rt["version"])
                      raise SystemExit(0)
          raise SystemExit("No available iPhone 16 Pro simulator found")
          PYEOF
          )
          echo "SIM_UDID=$SIM_UDID" >> "$GITHUB_ENV"
          echo "SIM_OS=$SIM_OS" >> "$GITHUB_ENV"
          echo "Booting simulator $SIM_UDID (iOS $SIM_OS)"
          xcrun simctl boot "$SIM_UDID" || true
          # Boot continues asynchronously — don't wait for bootstatus here

      - name: Init required submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive submodules/AccessibilitySnapshotBH

      - name: Install Tuist
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4

      - name: Cache Tuist dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: Tuist/.build
          key: ${{ runner.os }}-tuist-deps-${{ hashFiles('Tuist/Package.swift', 'Tuist/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-tuist-deps-

      - name: Install Tuist dependencies
        timeout-minutes: 5
        run: tuist install

      - name: Generate project
        timeout-minutes: 5
        run: tuist generate --no-binary-cache --no-open

      - name: Build iOS app targets
        timeout-minutes: 10
        run: |
          set -eo pipefail
          DEST="platform=iOS Simulator,id=$SIM_UDID"

          for scheme in "BH Demo" "UIKitTestApp" "ResearchApp"; do
            echo "Building $scheme..."
            xcodebuild -workspace ButtonHeist.xcworkspace -scheme "$scheme" \
              -destination "$DEST" build
          done

      - name: Measure framework sizes
        run: |
          DERIVED=$(ls -td ~/Library/Developer/Xcode/DerivedData/ButtonHeist*/Build/Products/Debug-iphonesimulator/ | head -1)
          echo "## Framework Sizes" >> "$GITHUB_STEP_SUMMARY"
          echo "| Framework | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|------|" >> "$GITHUB_STEP_SUMMARY"
          for fw in TheInsideJob TheScore ThePlant; do
            if [ -d "$DERIVED/${fw}.framework" ]; then
              SIZE=$(du -sh "$DERIVED/${fw}.framework" | cut -f1)
              echo "| ${fw} | ${SIZE} |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          if [ -d "$DERIVED/BH Demo.app" ]; then
            APP_SIZE=$(du -sh "$DERIVED/BH Demo.app" | cut -f1)
            echo "| BH Demo.app (total) | ${APP_SIZE} |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Wait for simulator boot
        timeout-minutes: 5
        run: xcrun simctl bootstatus "$SIM_UDID" -b

      - name: Run iOS tests
        # 695 tests in a hosted BH Demo bundle on macos-15 runner run right at
        # the 10-min edge — second-of-the-day decides pass/fail. Bumped to 20
        # for headroom while the suite stays this size. Structural follow-up:
        # split integration tests into a slow lane, or profile the worst
        # offenders.
        timeout-minutes: 20
        run: |
          set -eo pipefail
          echo "Running tests on iPhone 16 Pro (iOS $SIM_OS)"
          tuist test TheInsideJobTests --platform ios --device "iPhone 16 Pro" --os "$SIM_OS" --no-selective-testing
