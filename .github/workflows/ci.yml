name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swiftlint:
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict

  bumper-bowling:
    name: Bumper Bowling
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Run Bumper Bowling
        run: scripts/check-source-shape.sh

      - name: Test source-shape guardrails
        env:
          BUMPER_BOWLING_PACKAGE_PATH: ${{ github.workspace }}/.build/bumper-bowling
        run: scripts/tests/check-source-shape-test.sh

  release-contract:
    # Release/install validation belongs in CI. Version bumps belong in the
    # release script, not in every implementation PR that touches shared types.
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Validate release/install contract
        run: scripts/validate-release-contract.sh

      - name: Validate adversarial receipt timing parser
        run: python3 scripts/check-e2e-adversarial-lab-timing.py

  submodule-pin:
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify AccessibilitySnapshotBH parser contract
        run: scripts/check-parser-contract.sh

  spm-package:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Resolve SPM dependencies
        timeout-minutes: 12
        run: swift package resolve

      - name: Build TheScore
        timeout-minutes: 5
        run: swift build --target TheScore

      - name: Build ButtonHeist
        timeout-minutes: 5
        run: swift build --target ButtonHeist

      - name: Check Swift public API breakage
        timeout-minutes: 12
        run: scripts/check-swift-api-breaking-changes.sh

      - name: Check external ButtonHeist import contract
        timeout-minutes: 12
        run: scripts/check-buttonheist-import-contract.sh

      - name: Build heist-plan
        timeout-minutes: 5
        run: swift build --product heist-plan

  heist-plan-tests:
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Init required submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive submodules/AccessibilitySnapshotBH

      - name: Build heist-plan
        timeout-minutes: 8
        run: swift build --product heist-plan

      - name: Smoke test heist-plan compile
        timeout-minutes: 12
        env:
          HEIST_PLAN_TOOL: ${{ github.workspace }}/.build/debug/heist-plan
        run: scripts/test-heist-plan-compile.sh

      - name: Run HeistPlanToolTests
        timeout-minutes: 15
        env:
          HEIST_PLAN_TOOL: ${{ github.workspace }}/.build/debug/heist-plan
        run: scripts/swift-test-gate.sh HeistPlanTests --disable-xctest

  macos-tests:
    runs-on: macos-15
    timeout-minutes: 25
    env:
      BUTTONHEIST_RECEIPTS_DIR: ${{ github.workspace }}/ci-artifacts/buttonheist-receipts/macos-tests
      BUTTONHEIST_RECEIPTS_MODE: ${{ github.ref == 'refs/heads/main' && 'failing-and-passing' || 'failures' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Init required submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive submodules/AccessibilitySnapshotBH

      - name: Install Tuist
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4

      - name: Install Tuist dependencies
        timeout-minutes: 12
        run: tuist install

      - name: Generate project
        timeout-minutes: 3
        run: |
          BUTTONHEIST_TUIST_SKIP_AUTO_CLEAN=1 tuist generate --no-binary-cache --no-open
          ./scripts/clean-generated-projects.sh

      - name: Run TheScoreTests
        timeout-minutes: 5
        run: |
          scripts/run-with-heist-receipts.sh \
            --dir "$BUTTONHEIST_RECEIPTS_DIR" \
            --mode "$BUTTONHEIST_RECEIPTS_MODE" \
            -- tuist test TheScoreTests --no-selective-testing

      - name: Run ButtonHeistTests
        timeout-minutes: 5
        run: |
          set -eo pipefail
          scripts/run-with-heist-receipts.sh \
            --dir "$BUTTONHEIST_RECEIPTS_DIR" \
            --mode "$BUTTONHEIST_RECEIPTS_MODE" \
            -- xcodebuild test -workspace ButtonHeist.xcworkspace -scheme ButtonHeistTests \
            -destination 'platform=macOS'

      - name: Build & test CLI (SwiftPM)
        timeout-minutes: 12
        run: |
          swift package --package-path ButtonHeistCLI resolve
          swift build --package-path ButtonHeistCLI
          scripts/run-with-heist-receipts.sh \
            --dir "$BUTTONHEIST_RECEIPTS_DIR" \
            --mode "$BUTTONHEIST_RECEIPTS_MODE" \
            -- scripts/swift-test-gate.sh ButtonHeistCLI

      - name: Build & test MCP (SwiftPM)
        timeout-minutes: 12
        run: |
          swift package --package-path ButtonHeistMCP resolve
          swift build --package-path ButtonHeistMCP
          scripts/run-with-heist-receipts.sh \
            --dir "$BUTTONHEIST_RECEIPTS_DIR" \
            --mode "$BUTTONHEIST_RECEIPTS_MODE" \
            -- scripts/swift-test-gate.sh ButtonHeistMCP

      - name: Run heist doctor receipt demo
        timeout-minutes: 8
        run: scripts/heist-doctor-demo.sh --work-dir "$RUNNER_TEMP/heist-doctor-demo" --format json

      - name: Write heist receipt manifest
        if: always()
        run: scripts/write-ci-heist-receipt-manifest.sh "$BUTTONHEIST_RECEIPTS_DIR" macos-tests

      - name: Upload heist receipts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: buttonheist-receipts-macos-tests-${{ github.run_attempt }}
          path: ${{ env.BUTTONHEIST_RECEIPTS_DIR }}
          if-no-files-found: error
          retention-days: 14

  ios-tests:
    name: ios-tests (${{ matrix.lane }})
    runs-on: macos-15
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: core
            scheme: TheInsideJobTests
            device: iPhone 16 Pro
          - lane: dogfood-feature
            scheme: DogfoodFeatureFlowTests
            device: iPhone 16 Pro
          - lane: dogfood-runtime
            scheme: DogfoodRuntimeContractTests
            device: iPhone 16 Pro
          - lane: adversarial-mutation
            scheme: AdversarialMutationTests
            device: iPhone 16 Pro
          - lane: adversarial-navigation
            scheme: AdversarialNavigationTests
            device: iPhone 16 Pro
    env:
      DERIVED_DATA_PATH: /tmp/ButtonHeistDerivedData-${{ matrix.lane }}
      BUTTONHEIST_CI_SIM_NAME: buttonheist-ci-ios-tests-${{ matrix.lane }}-${{ github.run_id }}-${{ github.run_attempt }}
      BUTTONHEIST_RECEIPTS_DIR: process-temporary-directory
      BUTTONHEIST_RECEIPTS_MODE: ${{ github.ref == 'refs/heads/main' && 'failing-and-passing' || 'failures' }}
      BUTTONHEIST_CI_RECEIPTS_DIR: ${{ github.workspace }}/ci-artifacts/buttonheist-receipts/ios-tests-${{ matrix.lane }}
      IOS_TEST_RESULT_BUNDLE: ${{ runner.temp }}/ios-tests-${{ matrix.lane }}.xcresult
      IOS_TEST_DIAGNOSTICS_DIR: ${{ runner.temp }}/ios-tests-${{ matrix.lane }}-diagnostics

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Boot simulator in background
        run: |
          python3 scripts/select-ios-ci-simulator.py \
            --preferred-device "${{ matrix.device }}" \
            --sim-name "$BUTTONHEIST_CI_SIM_NAME"
          # Boot continues asynchronously; don't wait for bootstatus here.

      - name: Init required submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive submodules/AccessibilitySnapshotBH

      - name: Install Tuist
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4

      - name: Install Tuist dependencies
        timeout-minutes: 12
        run: tuist install

      - name: Generate project
        timeout-minutes: 5
        run: |
          BUTTONHEIST_TUIST_SKIP_AUTO_CLEAN=1 tuist generate --no-binary-cache --no-open
          ./scripts/clean-generated-projects.sh

      - name: Build ${{ matrix.scheme }} for iOS
        timeout-minutes: 20
        run: |
          set -eo pipefail
          echo "IOS_TEST_BUILD_START=$(date +%s)" >> "$GITHUB_ENV"
          trap 'echo "IOS_TEST_BUILD_END=$(date +%s)" >> "$GITHUB_ENV"' EXIT
          DEST="platform=iOS Simulator,id=$SIM_UDID,arch=arm64"

          xcodebuild build-for-testing -workspace ButtonHeist.xcworkspace -scheme "${{ matrix.scheme }}" \
            -destination "$DEST" \
            -derivedDataPath "$DERIVED_DATA_PATH"

      - name: Wait for simulator boot
        timeout-minutes: 5
        run: xcrun simctl bootstatus "$SIM_UDID" -b

      - name: Run ${{ matrix.scheme }}
        # Run the hosted iOS test bundle before demo smoke gates so test compile
        # and runtime failures fail before spending minutes replaying CLI flows.
        timeout-minutes: 30
        run: |
          set -eo pipefail
          echo "IOS_TEST_RUN_START=$(date +%s)" >> "$GITHUB_ENV"
          trap 'echo "IOS_TEST_RUN_END=$(date +%s)" >> "$GITHUB_ENV"' EXIT
          DEST="platform=iOS Simulator,id=$SIM_UDID,arch=arm64"
          rm -rf "$IOS_TEST_RESULT_BUNDLE"
          echo "Running ${{ matrix.scheme }} on $SIM_DEVICE_TYPE (iOS $SIM_OS)"

          run_hosted_tests() {
            scripts/run-with-heist-receipts.sh \
              --ios-sandbox \
              --mode "$BUTTONHEIST_RECEIPTS_MODE" \
              -- xcodebuild test-without-building -workspace ButtonHeist.xcworkspace -scheme "${{ matrix.scheme }}" \
              -destination "$DEST" \
              -derivedDataPath "$DERIVED_DATA_PATH" \
              -resultBundlePath "$IOS_TEST_RESULT_BUNDLE" \
              "$@"
          }

          if [[ "${{ matrix.lane }}" == "core" ]]; then
            run_hosted_tests \
              -skip-testing TheInsideJobTests/SimpleSocketServerIntegrationTests \
              -skip-testing TheInsideJobTests/SocketClientRegistryTests \
              -skip-testing TheInsideJobTests/SocketClientLifecycleTests \
              -skip-testing TheInsideJobTests/TLSIntegrationTests \
              -skip-testing TheInsideJobTests/TheSafecrackerIntegrationTests
          else
            run_hosted_tests
          fi

      - name: Collect iOS heist receipts
        if: always()
        run: |
          if [[ -n "${SIM_UDID:-}" ]]; then
            scripts/collect-ios-heist-receipts.sh "$SIM_UDID" "$BUTTONHEIST_CI_RECEIPTS_DIR"
          else
            echo "SIM_UDID is unavailable; skipping iOS heist receipt collection"
          fi

      - name: Write heist receipt manifest
        if: always()
        run: scripts/write-ci-heist-receipt-manifest.sh "$BUTTONHEIST_CI_RECEIPTS_DIR" "ios-tests-${{ matrix.lane }}"

      - name: Upload heist receipts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: buttonheist-receipts-ios-tests-${{ matrix.lane }}-${{ github.run_attempt }}
          path: ${{ env.BUTTONHEIST_CI_RECEIPTS_DIR }}
          if-no-files-found: error
          retention-days: 14

      - name: Collect iOS test diagnostics
        if: always()
        run: |
          mkdir -p "$IOS_TEST_DIAGNOSTICS_DIR"
          xcrun simctl list devices > "$IOS_TEST_DIAGNOSTICS_DIR/simulators.txt"
          if [[ -n "${SIM_UDID:-}" ]]; then
            xcrun simctl spawn "$SIM_UDID" log show \
              --style compact \
              --last 30m \
              > "$IOS_TEST_DIAGNOSTICS_DIR/simulator.log" 2>&1 || true
          fi

      - name: Upload iOS test result and diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: buttonheist-ios-test-diagnostics-${{ matrix.lane }}-${{ github.run_attempt }}
          path: |
            ${{ env.IOS_TEST_RESULT_BUNDLE }}
            ${{ env.IOS_TEST_DIAGNOSTICS_DIR }}
          if-no-files-found: warn
          retention-days: 14

      - name: Report iOS test timings
        if: always()
        run: |
          append_duration() {
            local label="$1"
            local start="$2"
            local end="$3"
            if [[ -n "$start" && -n "$end" && "$end" -ge "$start" ]]; then
              local duration=$((end - start))
              printf '| %s | %dm %02ds |\n' "$label" $((duration / 60)) $((duration % 60))
            else
              printf '| %s | unavailable |\n' "$label"
            fi
          }

          {
            echo "## iOS Test Timings"
            echo "| Phase | Duration |"
            echo "|-------|----------|"
            append_duration "Build ${{ matrix.scheme }}" "${IOS_TEST_BUILD_START:-}" "${IOS_TEST_BUILD_END:-}"
            append_duration "Run ${{ matrix.scheme }}" "${IOS_TEST_RUN_START:-}" "${IOS_TEST_RUN_END:-}"
          } >> "$GITHUB_STEP_SUMMARY"

  ios-demo-gates:
    runs-on: macos-15
    timeout-minutes: 25
    env:
      DERIVED_DATA_PATH: /tmp/ButtonHeistDerivedData-demo
      BUTTONHEIST_RECEIPTS_DIR: ${{ github.workspace }}/ci-artifacts/buttonheist-receipts/ios-demo-gates
      BUTTONHEIST_RECEIPTS_MODE: ${{ github.ref == 'refs/heads/main' && 'failing-and-passing' || 'failures' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Boot simulator in background
        run: |
          python3 scripts/select-ios-ci-simulator.py
          # Boot continues asynchronously; don't wait for bootstatus here.

      - name: Init required submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive submodules/AccessibilitySnapshotBH

      - name: Install Tuist
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4

      - name: Install Tuist dependencies
        timeout-minutes: 12
        run: tuist install

      - name: Generate project
        timeout-minutes: 5
        run: |
          BUTTONHEIST_TUIST_SKIP_AUTO_CLEAN=1 tuist generate --no-binary-cache --no-open
          ./scripts/clean-generated-projects.sh

      - name: Build iOS app targets
        timeout-minutes: 12
        run: |
          set -eo pipefail
          echo "IOS_DEMO_BUILD_START=$(date +%s)" >> "$GITHUB_ENV"
          trap 'echo "IOS_DEMO_BUILD_END=$(date +%s)" >> "$GITHUB_ENV"' EXIT
          DEST="platform=iOS Simulator,id=$SIM_UDID,arch=arm64"

          xcodebuild -workspace ButtonHeist.xcworkspace -scheme "BH Demo" \
            -destination "$DEST" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            build

      - name: Measure framework sizes
        run: |
          DERIVED="$DERIVED_DATA_PATH/Build/Products/Debug-iphonesimulator"
          {
            echo "## Framework Sizes"
            echo "| Framework | Size |"
            echo "|-----------|------|"
            for fw in TheInsideJob TheScore ThePlant; do
              if [ -d "$DERIVED/${fw}.framework" ]; then
                SIZE=$(du -sh "$DERIVED/${fw}.framework" | cut -f1)
                echo "| ${fw} | ${SIZE} |"
              fi
            done
            if [ -d "$DERIVED/BHDemo.app" ]; then
              APP_SIZE=$(du -sh "$DERIVED/BHDemo.app" | cut -f1)
              echo "| BHDemo.app (total) | ${APP_SIZE} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build ButtonHeist CLI
        timeout-minutes: 8
        run: swift build --package-path ButtonHeistCLI

      - name: Run BH Demo CLI smoke
        # Cold CLI SwiftPM resolution plus simulator install can exceed 5 min
        # on macOS runners; keep this bounded without clipping valid replay runs.
        timeout-minutes: 12
        run: |
          set -eo pipefail
          echo "IOS_DEMO_SMOKE_START=$(date +%s)" >> "$GITHUB_ENV"
          trap 'echo "IOS_DEMO_SMOKE_END=$(date +%s)" >> "$GITHUB_ENV"' EXIT
          APP="$DERIVED_DATA_PATH/Build/Products/Debug-iphonesimulator/BHDemo.app"
          scripts/run-with-heist-receipts.sh \
            --dir "$BUTTONHEIST_RECEIPTS_DIR" \
            --mode "$BUTTONHEIST_RECEIPTS_MODE" \
            -- scripts/e2e-demo-smoke.sh \
            --skip-generate \
            --skip-cli-build \
            --sim-udid "$SIM_UDID" \
            --app "$APP" \
            --benchmark-report "$RUNNER_TEMP/buttonheist-demo-benchmark.json"

      - name: Run BH Demo lifecycle gate
        timeout-minutes: 8
        run: |
          set -eo pipefail
          echo "IOS_DEMO_LIFECYCLE_START=$(date +%s)" >> "$GITHUB_ENV"
          trap 'echo "IOS_DEMO_LIFECYCLE_END=$(date +%s)" >> "$GITHUB_ENV"' EXIT
          APP="$DERIVED_DATA_PATH/Build/Products/Debug-iphonesimulator/BHDemo.app"
          scripts/run-with-heist-receipts.sh \
            --dir "$BUTTONHEIST_RECEIPTS_DIR" \
            --mode "$BUTTONHEIST_RECEIPTS_MODE" \
            -- scripts/e2e-lifecycle-gate.py \
            --sim-udid "$SIM_UDID" \
            --app "$APP" \
            --cli "$PWD/ButtonHeistCLI/.build/debug/buttonheist" \
            --report "$RUNNER_TEMP/buttonheist-lifecycle-report.json"

      - name: Collect demo diagnostics
        if: always()
        run: |
          mkdir -p "$BUTTONHEIST_RECEIPTS_DIR/diagnostics"
          {
            echo "buttonheistDemoDiagnostics=1"
            echo "runnerTemp=$RUNNER_TEMP"
          } > "$BUTTONHEIST_RECEIPTS_DIR/demo-diagnostics.txt"

          for report in \
            "$RUNNER_TEMP/buttonheist-demo-benchmark.json" \
            "$RUNNER_TEMP/buttonheist-lifecycle-report.json"; do
            name="$(basename "$report")"
            if [[ -f "$report" ]]; then
              cp "$report" "$BUTTONHEIST_RECEIPTS_DIR/diagnostics/$name"
              echo "$name=diagnostics/$name" >> "$BUTTONHEIST_RECEIPTS_DIR/demo-diagnostics.txt"
            else
              echo "$name=missing" >> "$BUTTONHEIST_RECEIPTS_DIR/demo-diagnostics.txt"
            fi
          done

      - name: Write heist receipt manifest
        if: always()
        run: scripts/write-ci-heist-receipt-manifest.sh "$BUTTONHEIST_RECEIPTS_DIR" ios-demo-gates

      - name: Upload heist receipts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: buttonheist-receipts-ios-demo-gates-${{ github.run_attempt }}
          path: ${{ env.BUTTONHEIST_RECEIPTS_DIR }}
          if-no-files-found: error
          retention-days: 14

      - name: Report iOS demo timings
        if: always()
        run: |
          append_duration() {
            local label="$1"
            local start="$2"
            local end="$3"
            if [[ -n "$start" && -n "$end" && "$end" -ge "$start" ]]; then
              local duration=$((end - start))
              printf '| %s | %dm %02ds |\n' "$label" $((duration / 60)) $((duration % 60))
            else
              printf '| %s | unavailable |\n' "$label"
            fi
          }

          {
            echo "## iOS Demo Timings"
            echo "| Phase | Duration |"
            echo "|-------|----------|"
            append_duration "Build iOS app targets" "${IOS_DEMO_BUILD_START:-}" "${IOS_DEMO_BUILD_END:-}"
            append_duration "Run demo CLI smoke" "${IOS_DEMO_SMOKE_START:-}" "${IOS_DEMO_SMOKE_END:-}"
            append_duration "Run demo lifecycle gate" "${IOS_DEMO_LIFECYCLE_START:-}" "${IOS_DEMO_LIFECYCLE_END:-}"
          } >> "$GITHUB_STEP_SUMMARY"
