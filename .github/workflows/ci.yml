name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swiftlint:
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict

  macos-tests:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Init required submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive submodules/AccessibilitySnapshot

      - name: Install Tuist
        uses: jdx/mise-action@v2

      - name: Cache Tuist dependencies
        uses: actions/cache@v4
        with:
          path: Tuist/.build
          key: ${{ runner.os }}-tuist-deps-${{ hashFiles('Tuist/Package.swift', 'Tuist/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-tuist-deps-

      - name: Install Tuist dependencies
        timeout-minutes: 5
        run: tuist install

      - name: Verify generated project is up to date
        timeout-minutes: 3
        run: |
          tuist generate --no-binary-cache
          git diff --exit-code -- '*.pbxproj' '*.xcworkspacedata' || {
            echo "::error::Generated Xcode project is out of date. Run 'tuist generate' and commit the changes."
            echo "::group::Diff"
            git diff -- '*.pbxproj' '*.xcworkspacedata'
            echo "::endgroup::"
            exit 1
          }

      - name: Run macOS tests
        timeout-minutes: 10
        run: |
          set -eo pipefail
          tuist test TheScoreTests --no-selective-testing
          tuist test ButtonHeistTests --no-selective-testing

  ios-tests:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Init required submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive submodules/AccessibilitySnapshot

      - name: Install Tuist
        uses: jdx/mise-action@v2

      - name: Cache Tuist dependencies
        uses: actions/cache@v4
        with:
          path: Tuist/.build
          key: ${{ runner.os }}-tuist-deps-${{ hashFiles('Tuist/Package.swift', 'Tuist/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-tuist-deps-

      - name: Install Tuist dependencies
        timeout-minutes: 5
        run: tuist install

      - name: Boot simulator in background
        run: |
          set -eo pipefail
          read -r SIM_UDID SIM_OS < <(python3 << 'PYEOF'
          import subprocess, json
          runtimes = json.loads(subprocess.check_output(
              ["xcrun", "simctl", "list", "runtimes", "-j"]))["runtimes"]
          devices = json.loads(subprocess.check_output(
              ["xcrun", "simctl", "list", "devices", "available", "-j"]))["devices"]
          for rt in sorted(runtimes, key=lambda r: r["version"], reverse=True):
              if rt["platform"] != "iOS" or not rt["isAvailable"]:
                  continue
              if not rt["version"].startswith("18."):
                  continue
              for dev in devices.get(rt["identifier"], []):
                  if dev["name"] == "iPhone 16 Pro" and dev["isAvailable"]:
                      print(dev["udid"], rt["version"])
                      raise SystemExit(0)
          raise SystemExit("No iPhone 16 Pro found on iOS 18.x")
          PYEOF
          )
          echo "SIM_UDID=$SIM_UDID" >> "$GITHUB_ENV"
          echo "SIM_OS=$SIM_OS" >> "$GITHUB_ENV"
          echo "Booting simulator $SIM_UDID (iOS $SIM_OS)"
          xcrun simctl boot "$SIM_UDID" || true
          # Boot continues asynchronously — don't wait for bootstatus here

      - name: Generate project
        timeout-minutes: 3
        run: tuist generate --no-binary-cache --no-open

      - name: Build iOS app targets
        timeout-minutes: 10
        run: |
          set -eo pipefail
          DEST="platform=iOS Simulator,id=$SIM_UDID"

          for scheme in "BH Demo" "UIKitTestApp" "ResearchApp"; do
            echo "Building $scheme..."
            xcodebuild -workspace ButtonHeist.xcworkspace -scheme "$scheme" \
              -destination "$DEST" build
          done

      - name: Wait for simulator boot
        timeout-minutes: 5
        run: xcrun simctl bootstatus "$SIM_UDID" -b

      - name: Run iOS tests
        timeout-minutes: 10
        run: |
          set -eo pipefail
          echo "Running tests on iPhone 16 Pro (iOS $SIM_OS)"
          tuist test TheInsideJobTests --platform ios --device "iPhone 16 Pro" --os "$SIM_OS" --no-selective-testing
