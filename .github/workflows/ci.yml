name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-contract:
    name: release-contract
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Validate repository contracts
        run: |
          echo "PORTABLE_START=$(date +%s)" >> "$GITHUB_ENV"
          scripts/validate-release-contract.sh

      - name: Validate adversarial automation
        run: |
          python3 scripts/check-e2e-adversarial-lab-timing.py
          python3 scripts/tests/adversarial-nightly-workflow-test.py
          python3 scripts/tests/ci-workflow-test.py
          python3 scripts/tests/e2e-lifecycle-gate-test.py

      - name: Test portable automation
        run: |
          scripts/tests/check-swift-api-breaking-changes-test.sh
          scripts/tests/e2e-demo-smoke-test.sh
          scripts/tests/generate-project-test.sh
          scripts/tests/release-automation-test.sh
          scripts/tests/require-successful-ci-for-commit-test.sh
          python3 scripts/tests/critical-mutation-results-test.py
          python3 scripts/tests/critical-mutations-workflow-test.py
          python3 scripts/tests/mutation-gate-test.py
          python3 scripts/tests/select-critical-mutations-test.py
          python3 scripts/tests/select-ci-change-scopes-test.py
          python3 scripts/tests/select-ios-ci-simulator-test.py
          python3 scripts/tests/test-runner-test.py

      - name: Report portable contract timing
        if: success()
        run: |
          PORTABLE_END=$(date +%s)
          echo "Portable contracts: $((PORTABLE_END - PORTABLE_START))s" >> "$GITHUB_STEP_SUMMARY"

  macos-tests:
    name: macos-tests
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: macos-15
    timeout-minutes: 45
    env:
      BUTTONHEIST_RECEIPTS_MODE: failures
      BUTTONHEIST_TEST_ARTIFACTS_DIR: ${{ github.workspace }}/ci-artifacts/test-runs
      BUTTONHEIST_MAX_WAIT_TIMEOUT: "60"

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Classify changed paths
        if: github.event_name == 'pull_request'
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          git diff --name-only --no-renames "$BASE_SHA" "$HEAD_SHA" \
            | python3 scripts/select-ci-change-scopes.py --github-output "$GITHUB_OUTPUT"

      - name: Select Xcode 26.3
        run: |
          echo "MAC_VALIDATION_START=$(date +%s)" >> "$GITHUB_ENV"
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install build tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run fast source validation
        run: |
          swiftlint lint --strict
          scripts/check-source-shape.sh

      - name: Test Bumper rules
        if: github.event_name == 'push' || steps.changes.outputs.run_bumper_rule_tests == 'true'
        run: scripts/check-source-shape.sh test

      - name: Validate Swift package products and public API
        if: github.event_name == 'push' || steps.changes.outputs.run_package_api_contracts == 'true'
        timeout-minutes: 15
        run: |
          scripts/check-swift-api-breaking-changes.sh
          scripts/check-buttonheist-import-contract.sh

      - name: Install dependencies and generate project
        timeout-minutes: 12
        run: |
          tuist install
          ./scripts/generate-project.sh --skip-install --no-binary-cache

      - name: Run macOS framework tests
        timeout-minutes: 15
        run: scripts/test-runner.py run MacFrameworkTests --selection full

      - name: Run CLI, MCP, and heist-plan tests
        if: github.event_name == 'push' || steps.changes.outputs.run_cli_tool_tests == 'true'
        timeout-minutes: 15
        env:
          HEIST_PLAN_TOOL: ${{ github.workspace }}/.build/debug/heist-plan
        run: |
          swift build --product heist-plan
          scripts/test-heist-plan-compile.sh
          scripts/swift-test-gate.sh HeistPlanTests --disable-xctest
          scripts/swift-test-gate.sh ButtonHeistCLI
          scripts/swift-test-gate.sh ButtonHeistMCP

      - name: Collect macOS failure evidence
        if: failure()
        run: scripts/test-runner.py collect MacFrameworkTests

      - name: Upload macOS failure receipts
        if: failure()
        uses: ./.github/actions/finalize-heist-receipts
        with:
          receipt-directory: ${{ env.BUTTONHEIST_TEST_RECEIPTS_DIR }}
          job-label: macos-tests
          artifact-name: buttonheist-receipts-macos-tests-${{ github.run_attempt }}
          retention-days: 14

      - name: Report macOS validation timing
        if: success()
        run: |
          MAC_VALIDATION_END=$(date +%s)
          echo "Consolidated macOS validation: $((MAC_VALIDATION_END - MAC_VALIDATION_START))s" \
            >> "$GITHUB_STEP_SUMMARY"

  ios-tests:
    name: ios-tests
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: macos-15
    timeout-minutes: 40
    env:
      BUTTONHEIST_RECEIPTS_MODE: failures
      BUTTONHEIST_TEST_ARTIFACTS_DIR: ${{ github.workspace }}/ci-artifacts/test-runs
      BUTTONHEIST_TEST_SIMULATOR_NAME: buttonheist-ci-core-demo-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install Tuist
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4

      - name: Install dependencies and generate project
        timeout-minutes: 12
        run: |
          tuist install
          ./scripts/generate-project.sh --skip-install --no-binary-cache

      - name: Build core tests and BH Demo once
        timeout-minutes: 20
        run: |
          echo "IOS_CORE_BUILD_START=$(date +%s)" >> "$GITHUB_ENV"
          scripts/test-runner.py build-for-testing TheInsideJobTests
          echo "IOS_CORE_BUILD_END=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build ButtonHeist CLI
        timeout-minutes: 8
        run: swift build --package-path ButtonHeistCLI

      - name: Run deterministic iOS core
        timeout-minutes: 18
        run: |
          echo "IOS_CORE_RUN_START=$(date +%s)" >> "$GITHUB_ENV"
          scripts/test-runner.py test-without-building TheInsideJobTests
          echo "IOS_CORE_RUN_END=$(date +%s)" >> "$GITHUB_ENV"

      - name: Run trimmed BH Demo smoke
        timeout-minutes: 10
        run: |
          echo "IOS_DEMO_RUN_START=$(date +%s)" >> "$GITHUB_ENV"
          APP="$BUTTONHEIST_TEST_DERIVED_DATA/Build/Products/Debug-iphonesimulator/BHDemo.app"
          scripts/run-with-heist-receipts.sh \
            --dir "$BUTTONHEIST_TEST_RECEIPTS_DIR" \
            --mode "$BUTTONHEIST_RECEIPTS_MODE" \
            -- scripts/e2e-demo-smoke.sh \
            --skip-generate \
            --skip-cli-build \
            --sim-udid "$SIM_UDID" \
            --app "$APP"
          echo "IOS_DEMO_RUN_END=$(date +%s)" >> "$GITHUB_ENV"

      - name: Collect iOS failure evidence
        if: failure()
        run: scripts/test-runner.py collect TheInsideJobTests

      - name: Upload iOS failure receipts
        if: failure()
        uses: ./.github/actions/finalize-heist-receipts
        with:
          receipt-directory: ${{ env.BUTTONHEIST_TEST_RECEIPTS_DIR }}
          job-label: ios-tests
          artifact-name: buttonheist-receipts-ios-tests-${{ github.run_attempt }}
          retention-days: 14

      - name: Upload iOS failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: buttonheist-ios-test-diagnostics-core-${{ github.run_attempt }}
          path: |
            ${{ env.BUTTONHEIST_TEST_RESULT_BUNDLE }}
            ${{ env.BUTTONHEIST_TEST_DIAGNOSTICS_DIR }}
          if-no-files-found: warn
          retention-days: 14

      - name: Report iOS core and demo timings
        if: success()
        run: |
          duration() { echo $(( $2 - $1 )); }
          {
            echo "## iOS Core and Demo Timings"
            echo "- Build: $(duration "$IOS_CORE_BUILD_START" "$IOS_CORE_BUILD_END")s"
            echo "- Core: $(duration "$IOS_CORE_RUN_START" "$IOS_CORE_RUN_END")s"
            echo "- Demo smoke: $(duration "$IOS_DEMO_RUN_START" "$IOS_DEMO_RUN_END")s"
          } >> "$GITHUB_STEP_SUMMARY"

  ios-demo-gates:
    name: ios-demo-gates
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: macos-15
    timeout-minutes: 35
    env:
      BUTTONHEIST_RECEIPTS_MODE: failures
      BUTTONHEIST_TEST_ARTIFACTS_DIR: ${{ github.workspace }}/ci-artifacts/test-runs
      BUTTONHEIST_TEST_SIMULATOR_NAME: buttonheist-ci-hosted-canaries-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install Tuist
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4

      - name: Install dependencies and generate project
        timeout-minutes: 12
        run: |
          tuist install
          ./scripts/generate-project.sh --skip-install --no-binary-cache

      - name: Build hosted behavior once
        timeout-minutes: 20
        run: |
          echo "HOSTED_BUILD_START=$(date +%s)" >> "$GITHUB_ENV"
          scripts/test-runner.py build-for-testing HostedBehaviorTests
          echo "HOSTED_BUILD_END=$(date +%s)" >> "$GITHUB_ENV"

      - name: Run representative hosted canaries
        timeout-minutes: 15
        run: |
          echo "HOSTED_RUN_START=$(date +%s)" >> "$GITHUB_ENV"
          scripts/test-runner.py test-without-building HostedBehaviorTests
          echo "HOSTED_RUN_END=$(date +%s)" >> "$GITHUB_ENV"

      - name: Collect hosted failure evidence
        if: failure()
        run: scripts/test-runner.py collect HostedBehaviorTests

      - name: Upload hosted failure receipts
        if: failure()
        uses: ./.github/actions/finalize-heist-receipts
        with:
          receipt-directory: ${{ env.BUTTONHEIST_TEST_RECEIPTS_DIR }}
          job-label: ios-demo-gates
          artifact-name: buttonheist-receipts-hosted-canaries-${{ github.run_attempt }}
          retention-days: 14

      - name: Upload hosted failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: buttonheist-hosted-canary-diagnostics-${{ github.run_attempt }}
          path: |
            ${{ env.BUTTONHEIST_TEST_RESULT_BUNDLE }}
            ${{ env.BUTTONHEIST_TEST_DIAGNOSTICS_DIR }}
          if-no-files-found: warn
          retention-days: 14

      - name: Report hosted canary timings
        if: success()
        run: |
          {
            echo "## Hosted Canary Timings"
            echo "- Build: $((HOSTED_BUILD_END - HOSTED_BUILD_START))s"
            echo "- Run: $((HOSTED_RUN_END - HOSTED_RUN_START))s"
          } >> "$GITHUB_STEP_SUMMARY"

  main-integration:
    name: main-integration
    needs: ios-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-15
    timeout-minutes: 35
    env:
      BUTTONHEIST_RECEIPTS_MODE: failures
      BUTTONHEIST_TEST_ARTIFACTS_DIR: ${{ github.workspace }}/ci-artifacts/test-runs
      BUTTONHEIST_TEST_SIMULATOR_NAME: buttonheist-ci-main-integration-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.sha }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install Tuist
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4

      - name: Install dependencies and generate project
        timeout-minutes: 12
        run: |
          tuist install
          ./scripts/generate-project.sh --skip-install --no-binary-cache

      - name: Build integration suite
        timeout-minutes: 20
        run: |
          echo "INTEGRATION_BUILD_START=$(date +%s)" >> "$GITHUB_ENV"
          scripts/test-runner.py build-for-testing TheInsideJobIntegrationTests
          echo "INTEGRATION_BUILD_END=$(date +%s)" >> "$GITHUB_ENV"

      - name: Run genuine iOS integration suite
        timeout-minutes: 18
        run: |
          echo "INTEGRATION_RUN_START=$(date +%s)" >> "$GITHUB_ENV"
          scripts/test-runner.py test-without-building TheInsideJobIntegrationTests
          echo "INTEGRATION_RUN_END=$(date +%s)" >> "$GITHUB_ENV"

      - name: Collect integration failure evidence
        if: failure()
        run: scripts/test-runner.py collect TheInsideJobIntegrationTests

      - name: Upload integration failure receipts
        if: failure()
        uses: ./.github/actions/finalize-heist-receipts
        with:
          receipt-directory: ${{ env.BUTTONHEIST_TEST_RECEIPTS_DIR }}
          job-label: main-integration
          artifact-name: buttonheist-receipts-main-integration-${{ github.run_attempt }}
          retention-days: 14

      - name: Upload integration failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: buttonheist-main-integration-diagnostics-${{ github.run_attempt }}
          path: |
            ${{ env.BUTTONHEIST_TEST_RESULT_BUNDLE }}
            ${{ env.BUTTONHEIST_TEST_DIAGNOSTICS_DIR }}
          if-no-files-found: warn
          retention-days: 14

      - name: Report integration timings
        if: success()
        run: |
          {
            echo "## Main Integration Timings"
            echo "- Build: $((INTEGRATION_BUILD_END - INTEGRATION_BUILD_START))s"
            echo "- Run: $((INTEGRATION_RUN_END - INTEGRATION_RUN_START))s"
          } >> "$GITHUB_STEP_SUMMARY"

  critical-mutations:
    name: critical-mutations
    needs: [release-contract, macos-tests, ios-tests, ios-demo-gates, main-integration]
    if: >-
      always()
      && needs.release-contract.result == 'success'
      && needs.macos-tests.result == 'success'
      && needs.ios-tests.result == 'success'
      && needs.ios-demo-gates.result == 'success'
      && (github.event_name == 'pull_request' || needs.main-integration.result == 'success')
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install build tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4

      - name: Select critical mutations
        id: mutations
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only --no-renames "$BASE_SHA" "$HEAD_SHA" \
              | python3 scripts/select-critical-mutations.py --github-output "$GITHUB_OUTPUT"
          else
            echo "mutation_args=--all" >> "$GITHUB_OUTPUT"
          fi

      - name: Boot dedicated mutation simulator
        env:
          MUTATION_SIMULATOR: buttonheist-mutations-${{ github.run_id }}-${{ github.run_attempt }}
        run: python3 scripts/select-ios-ci-simulator.py --sim-name "$MUTATION_SIMULATOR" --wait

      - name: Run critical mutation gate
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          MUTATION_ARGS: ${{ steps.mutations.outputs.mutation_args }}
        run: |
          read -r -a mutation_args <<< "$MUTATION_ARGS"
          scripts/mutation-gate.py \
            --commit "$COMMIT_SHA" \
            "${mutation_args[@]}" \
            --simulator-name "$SIM_NAME" \
            --output ci-artifacts/critical-mutations

      - name: Upload mutation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: buttonheist-critical-mutations-${{ github.run_attempt }}
          path: ci-artifacts/critical-mutations
          if-no-files-found: error
          retention-days: 14

      - name: Remove dedicated mutation simulator
        if: always()
        run: |
          if [[ -n "${SIM_UDID:-}" ]]; then
            xcrun simctl shutdown "$SIM_UDID" || true
            xcrun simctl delete "$SIM_UDID" || true
          fi

  exact-sha-suite:
    name: exact-sha-suite
    needs: [release-contract, macos-tests, ios-tests, ios-demo-gates, main-integration, critical-mutations]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.sha }}

      - name: Download critical mutation evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: buttonheist-critical-mutations-${{ github.run_attempt }}
          path: critical-mutations

      - name: Require complete exact-SHA mutation evidence
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          jq -e \
            --arg commit "$COMMIT_SHA" \
            --slurpfile manifest scripts/mutations.json \
            -f scripts/critical-mutation-results.jq \
            critical-mutations/mutation-results.json

      - name: Record exact-SHA suite manifest
        env:
          COMMIT_SHA: ${{ github.sha }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RELEASE_CONTRACT: ${{ needs.release-contract.result }}
          MACOS_TESTS: ${{ needs.macos-tests.result }}
          IOS_TESTS: ${{ needs.ios-tests.result }}
          IOS_DEMO_GATES: ${{ needs.ios-demo-gates.result }}
          MAIN_INTEGRATION: ${{ needs.main-integration.result }}
          CRITICAL_MUTATIONS: ${{ needs.critical-mutations.result }}
        run: |
          jq -n \
            --arg commit "$COMMIT_SHA" \
            --arg workflowRef "$WORKFLOW_REF" \
            --arg workflowSha "$WORKFLOW_SHA" \
            --arg runId "$RUN_ID" \
            --arg runAttempt "$RUN_ATTEMPT" \
            --arg releaseContract "$RELEASE_CONTRACT" \
            --arg macosTests "$MACOS_TESTS" \
            --arg iosTests "$IOS_TESTS" \
            --arg iosDemoGates "$IOS_DEMO_GATES" \
            --arg mainIntegration "$MAIN_INTEGRATION" \
            --arg criticalMutations "$CRITICAL_MUTATIONS" \
            '{
              schemaVersion: 1,
              commit: $commit,
              workflow: {
                ref: $workflowRef,
                sha: $workflowSha,
                runId: $runId,
                runAttempt: $runAttempt
              },
              suites: [
                {name: "release-contract", conclusion: $releaseContract},
                {name: "macos-tests", conclusion: $macosTests},
                {name: "ios-tests", conclusion: $iosTests},
                {name: "ios-demo-gates", conclusion: $iosDemoGates},
                {name: "main-integration", conclusion: $mainIntegration},
                {name: "critical-mutations", conclusion: $criticalMutations}
              ]
            }' > exact-sha-suite.json

      - name: Upload exact-SHA suite manifest
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: buttonheist-exact-sha-suite
          path: exact-sha-suite.json
          if-no-files-found: error
          retention-days: 14

      - name: Require every release suite
        env:
          COMMIT_SHA: ${{ github.sha }}
          EXPECTED_WORKFLOW_REF: ${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main
          RUN_ID: ${{ github.run_id }}
        run: |
          jq -e \
            --arg commit "$COMMIT_SHA" \
            --arg workflowRef "$EXPECTED_WORKFLOW_REF" \
            --arg runId "$RUN_ID" \
            -f scripts/exact-sha-suite.jq \
            exact-sha-suite.json
