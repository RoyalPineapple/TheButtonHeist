name: Adversarial Nightly

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      passing_repeat_count:
        description: Passing scenario repeat count
        required: false
        default: "5"
      failure_repeat_count:
        description: Expected-failure scenario repeat count
        required: false
        default: "1"

concurrency:
  group: adversarial-nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  adversarial-nightly:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: macos-15
    timeout-minutes: 65
    env:
      DERIVED_DATA_PATH: /tmp/ButtonHeistDerivedData-adversarial
      BUTTONHEIST_ADVERSARIAL_REPEAT_COUNT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.passing_repeat_count || '5' }}
      BUTTONHEIST_ADVERSARIAL_FAILURE_REPEAT_COUNT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.failure_repeat_count || '1' }}
      BUTTONHEIST_ADVERSARIAL_CEILING_POLICY: fail
      BUTTONHEIST_RECEIPTS_DIR: ${{ github.workspace }}/ci-artifacts/buttonheist-receipts/adversarial-nightly
      BUTTONHEIST_RECEIPTS_MODE: failures

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Boot simulator in background
        run: |
          python3 scripts/select-ios-ci-simulator.py
          # Boot continues asynchronously while dependencies install.

      - name: Init required submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive submodules/AccessibilitySnapshotBH

      - name: Install Tuist
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4

      - name: Install Tuist dependencies
        timeout-minutes: 12
        run: tuist install

      - name: Generate project
        timeout-minutes: 5
        run: ./scripts/generate-project.sh --skip-install --no-binary-cache

      - name: Build BH Demo
        timeout-minutes: 12
        run: |
          DEST="platform=iOS Simulator,id=$SIM_UDID,arch=arm64"
          xcodebuild -workspace ButtonHeist.xcworkspace -scheme "BH Demo" \
            -destination "$DEST" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            build

      - name: Build ButtonHeist CLI
        timeout-minutes: 8
        run: swift build --package-path ButtonHeistCLI

      - name: Run adversarial lab
        timeout-minutes: 40
        run: |
          APP="$DERIVED_DATA_PATH/Build/Products/Debug-iphonesimulator/BHDemo.app"
          scripts/run-with-heist-receipts.sh \
            --dir "$BUTTONHEIST_RECEIPTS_DIR" \
            --mode "$BUTTONHEIST_RECEIPTS_MODE" \
            -- python3 scripts/e2e-adversarial-lab.py \
            --sim-udid "$SIM_UDID" \
            --app "$APP" \
            --cli "$PWD/ButtonHeistCLI/.build/debug/buttonheist" \
            --repeat-count "$BUTTONHEIST_ADVERSARIAL_REPEAT_COUNT" \
            --failure-repeat-count "$BUTTONHEIST_ADVERSARIAL_FAILURE_REPEAT_COUNT" \
            --ceiling-policy "$BUTTONHEIST_ADVERSARIAL_CEILING_POLICY" \
            --report "$RUNNER_TEMP/buttonheist-adversarial-nightly-report.json"

      - name: Run lifecycle gate
        if: always()
        timeout-minutes: 10
        run: |
          APP="$DERIVED_DATA_PATH/Build/Products/Debug-iphonesimulator/BHDemo.app"
          scripts/run-with-heist-receipts.sh \
            --dir "$BUTTONHEIST_RECEIPTS_DIR" \
            --mode "$BUTTONHEIST_RECEIPTS_MODE" \
            -- scripts/e2e-lifecycle-gate.py \
            --sim-udid "$SIM_UDID" \
            --app "$APP" \
            --cli "$PWD/ButtonHeistCLI/.build/debug/buttonheist" \
            --report "$RUNNER_TEMP/buttonheist-lifecycle-nightly-report.json"

      - name: Summarize nightly reports
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          reports = (
              ("Adversarial lab", Path(os.environ["RUNNER_TEMP"]) / "buttonheist-adversarial-nightly-report.json"),
              ("Lifecycle gate", Path(os.environ["RUNNER_TEMP"]) / "buttonheist-lifecycle-nightly-report.json"),
          )
          lines = ["## Nightly test summary", "", "| Gate | Status | Classification |", "|---|---|---|"]
          for label, path in reports:
              if not path.exists():
                  lines.append(f"| {label} | missing | infrastructure/setup failure |")
                  continue
              report = json.loads(path.read_text())
              status = report.get("status", "unknown")
              classification = report.get("failureKind", "none")
              if status in {"starting", "running"}:
                  classification = "infrastructure timeout/interruption"
              lines.append(f"| {label} | {status} | {classification} |")
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a") as summary:
              summary.write("\n".join(lines) + "\n")
          PY

      - name: Collect nightly failure diagnostics
        if: failure()
        run: |
          mkdir -p "$BUTTONHEIST_RECEIPTS_DIR/diagnostics"
          for report in \
            "$RUNNER_TEMP/buttonheist-adversarial-nightly-report.json" \
            "$RUNNER_TEMP/buttonheist-lifecycle-nightly-report.json"; do
            if [[ -f "$report" ]]; then
              cp "$report" "$BUTTONHEIST_RECEIPTS_DIR/diagnostics/$(basename "$report")"
            fi
          done

      - name: Finalize heist receipts
        if: failure()
        uses: ./.github/actions/finalize-heist-receipts
        with:
          receipt-directory: ${{ env.BUTTONHEIST_RECEIPTS_DIR }}
          job-label: adversarial-nightly
          artifact-name: buttonheist-receipts-adversarial-nightly-${{ github.run_attempt }}
          retention-days: 30
