name: Finalize Button Heist receipts
description: Write the canonical receipt manifest and upload the artifact bundle.
inputs:
  receipt-directory:
    description: Directory containing receipt JSON and diagnostics.
    required: true
  job-label:
    description: Stable job label written to the receipt manifest.
    required: true
  artifact-name:
    description: GitHub Actions artifact name.
    required: true
  retention-days:
    description: Artifact retention period.
    required: false
    default: "14"
runs:
  using: composite
  steps:
    - name: Write receipt manifest
      shell: bash
      run: scripts/write-ci-heist-receipt-manifest.sh "${{ inputs.receipt-directory }}" "${{ inputs.job-label }}"
    - name: Upload receipt artifact
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.receipt-directory }}
        if-no-files-found: error
        retention-days: ${{ inputs.retention-days }}
