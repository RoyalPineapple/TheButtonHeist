# SwiftLint Configuration

# Only lint project source directories
included:
  - ButtonHeist/Sources
  - ButtonHeist/Tests
  - ButtonHeistCLI/Sources
  - ButtonHeistCLI/Tests
  - ButtonHeistMCP/Sources
  - TestApp/Sources
  - TestApp/UIKitSources

excluded:
  - TestApp/Derived
  - .build
  - build
  - DerivedData

disabled_rules:
  - trailing_comma
  - large_tuple
  - force_cast
  - notification_center_detachment

# Rule configurations
line_length:
  warning: 160
  error: 250

file_length:
  warning: 600
  error: 1200

type_body_length:
  warning: 500
  error: 800

function_body_length:
  warning: 100
  error: 200

function_parameter_count:
  warning: 8
  error: 20

identifier_name:
  min_length:
    warning: 1
  max_length:
    warning: 60

type_name:
  min_length:
    warning: 2
  max_length:
    warning: 60

cyclomatic_complexity:
  warning: 15
  error: 35
