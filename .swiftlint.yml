# SwiftLint Configuration

# Only lint project source directories
included:
  - ButtonHeist/Sources
  - ButtonHeist/Tests
  - ButtonHeistCLI/Sources
  - ButtonHeistCLI/Tests
  - ButtonHeistMCP/Sources
  - TestApp/Sources

excluded:
  - TestApp/Derived
  - .build
  - build
  - DerivedData

disabled_rules:
  - trailing_comma
  - large_tuple
  - force_cast
  - notification_center_detachment
  - file_length
  - type_body_length

# Rule configurations
line_length:
  warning: 160
  error: 250

function_body_length:
  warning: 100
  error: 200

function_parameter_count:
  warning: 8
  error: 20

identifier_name:
  min_length:
    warning: 1
  max_length:
    warning: 60
  excluded:
    - If
    - RunHeist

type_name:
  min_length:
    warning: 2
  max_length:
    warning: 60

cyclomatic_complexity:
  warning: 20
  error: 35
  # Large switch statements over enum cases are lookup tables, not complexity.
  ignores_case_statements: true

blanket_disable_command:
  allowed_rules:
    - nesting

inclusive_language: {}

# Repository invariants not covered by standard SwiftLint rules.
custom_rules:
  agent_test_task_sleep:
    name: "Agent: Task.sleep / Thread.sleep in tests"
    regex: '(?<!cancellable)(?<!\.)\b(?:Task|Thread)\.sleep\b'
    # Include helpers under Tests/, not only files named *Tests.swift.
    included: ".*/Tests/.*\\.swift"
    match_kinds:
      - identifier
      - typeidentifier
    message: "Tests must not sleep on wall-clock time. See the test-sleep-avoidance skill for expectation / AsyncStream patterns."
    severity: warning

  agent_no_task_detached:
    name: "Agent: Task.detached banned"
    # Match calls and trailing closures without matching custom types ending in Task.
    regex: '\bTask\.detached\s*[({]'
    message: "Task.detached escapes the calling isolation context. Use structured concurrency or a tracked Task that inherits caller isolation."
    severity: error
