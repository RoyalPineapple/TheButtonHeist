# SwiftLint Configuration

# Only lint project source directories
included:
  - ButtonHeist/Sources
  - ButtonHeist/Tests
  - ButtonHeistCLI/Sources
  - ButtonHeistCLI/Tests
  - ButtonHeistMCP/Sources
  - TestApp/Sources
  - TestApp/UIKitSources

excluded:
  - TestApp/Derived
  - .build
  - build
  - DerivedData

disabled_rules:
  - trailing_comma
  - large_tuple
  - force_cast
  - notification_center_detachment
  - file_length
  - type_body_length

# Rule configurations
line_length:
  warning: 160
  error: 250

function_body_length:
  warning: 100
  error: 200

function_parameter_count:
  warning: 8
  error: 20

identifier_name:
  min_length:
    warning: 1
  max_length:
    warning: 60

type_name:
  min_length:
    warning: 2
  max_length:
    warning: 60

cyclomatic_complexity:
  warning: 20
  error: 35
  # Large switch statements over enum cases are lookup tables, not complexity.
  ignores_case_statements: true

blanket_disable_command:
  allowed_rules:
    - nesting

inclusive_language: {}

# Custom rules: catch canonical agent-code patterns that survived prior cleanups.
# Each rule has a low-false-positive regex; tune rather than disable inline.
custom_rules:
  agent_empty_else_if:
    name: "Agent: empty else-if branch"
    regex: '\}\s*else\s+if\s+(?:case\s+)?[^{]+\{\s*//[^\n]*\s*\}'
    message: "Empty else-if branch with only a comment looks like a stub left by an agent. Either implement the branch or remove it."
    severity: warning

  agent_xctassert_unwrap_doublet:
    name: "Agent: XCTAssertNotNil followed by force-unwrap"
    regex: 'XCTAssertNotNil\(\s*([A-Za-z_][A-Za-z0-9_]*)\s*\)[^\n]*\n(?:[^\n]*\n){0,2}[^\n]*\b\1!'
    message: "Force-unwrapping a value right after XCTAssertNotNil is a doublet — use XCTUnwrap or guard let instead."
    severity: error

  agent_reserved_for_future:
    name: "Agent: reserved-for-future placeholder"
    regex: '//\s*[Rr]eserved\s+for\s+future'
    message: "Reserved-for-future placeholders rarely materialise. Use the symbol now or delete it."
    severity: warning

  agent_test_task_sleep:
    name: "Agent: Task.sleep / Thread.sleep in tests"
    regex: '(?<!cancellable)(?<!\.)\b(?:Task|Thread)\.sleep\b'
    # Match any Swift file under a `Tests/` directory, not just files literally
    # named `*Tests.swift` — helpers (`*Helpers.swift`, `*Task.swift`) live in
    # the same dirs and the rule must catch their sleeps too.
    included: ".*/Tests/.*\\.swift"
    match_kinds:
      - identifier
      - typeidentifier
    message: "Tests must not sleep on wall-clock time. See the test-sleep-avoidance skill for expectation / AsyncStream patterns."
    severity: warning

  agent_main_actor_value_type:
    name: "Agent: @MainActor on a value type"
    regex: '@MainActor\s+(?:public\s+|internal\s+|private\s+|fileprivate\s+)?(?:final\s+)?(?:struct|enum)\s+\w+'
    message: "Sendable structs and enums must not carry @MainActor. Actor isolation belongs on reference types; values cross actors freely."
    severity: warning

  agent_unchecked_sendable_no_comment:
    name: "Agent: @unchecked Sendable without justification"
    # NSRegularExpression can't reliably inspect preceding-line comments, so
    # this rule flags every `@unchecked Sendable` token. Mentions inside
    # comments and strings are filtered by `match_kinds`. Use
    # `// swiftlint:disable:next agent_unchecked_sendable_no_comment` directly
    # above the declaration with a rationale for legitimate uses.
    regex: '@unchecked\s+Sendable'
    match_kinds:
      - attribute.builtin
      - identifier
      - keyword
      - typeidentifier
    message: "@unchecked Sendable requires a justification comment. Either fix the design or add `// swiftlint:disable:next agent_unchecked_sendable_no_comment` with rationale."
    severity: error

  agent_callback_bridge_task:
    name: "Agent: single-line MainActor callback bridge"
    # Single-line `Task { @MainActor in self.foo(...) }` and the `[weak self]`
    # capture-list variant. The capture list may sit before or after `@MainActor`
    # (Swift accepts both orderings). `self?\.` covers the weak-capture call form.
    regex: 'Task\s*\{\s*(?:\[[^\]]*\]\s*)?@MainActor(?:\s+\[[^\]]*\])?\s+in\s+self\??\.\w+\([^)]*\)\s*\}'
    message: "Single-line `Task { @MainActor in self.foo(...) }` bridges fire-and-forget. Annotate the callback's isolation in its type and call it directly."
    severity: warning

  agent_callback_bridge_task_multiline:
    name: "Agent: multi-line MainActor callback bridge"
    # Multi-line cousin of `agent_callback_bridge_task`. Matches the *opening*
    # of an unstored `Task { @MainActor [weak self] in` whose body spans
    # multiple lines. The leading anchor `^[ \t]+` is the key disambiguator:
    # stored Tasks read as `let task = Task { @MainActor in` or
    # `eventConsumerTask = Task { @MainActor in`, which never sit at the start
    # of an indented line.
    #
    # The trailing negative-lookahead `(?![ \t]+guard\s+let\s+self\s+else\b)`
    # excludes factory functions like `makePollingTask` that return the Task —
    # those bodies open with `guard let self else { return }` before doing
    # real work. The lookahead anchors before the indent so `[ \t]+`
    # backtracking can't fool it. Callback bridges, by contrast, dive straight
    # into a method call on `self?`, `self`, or a captured presenter.
    # `included:` further restricts this to production source so test helpers
    # (e.g. `TestSentinelTask.neverEndingTask`) that match the bare opener
    # don't trip it.
    regex: '^[ \t]+Task\s*\{\s*(?:\[[^\]]*\]\s*)?@MainActor(?:\s+\[[^\]]*\])?\s+in\s*\n(?![ \t]+guard\s+let\s+self\s+else\b)[ \t]+\S'
    included: ".*/(ButtonHeist|ButtonHeistCLI|ButtonHeistMCP)/Sources/.*\\.swift$"
    message: "Multi-line `Task { @MainActor in ... }` bridges fire-and-forget — no handle, no cancellation, no ordering guarantee. Annotate the callback's isolation in its declared closure type and call it directly, or store the Task on a tracked lifecycle field."
    severity: warning

  agent_callback_bridge_task_unstored_await:
    name: "Agent: unstored fire-and-forget actor-hop Task"
    # Catches `Task { await self.foo(...) }` and `Task { await self?.foo(...) }`
    # patterns spawned from NWConnection / NWListener callbacks (the audit's
    # SimpleSocketServer 5.4 cluster, plus the two inner `self?` Tasks in
    # 5.2's `showApprovalAlert`). The leading
    # `^[ \t]+` anchor restricts this to statement-position Tasks — stored Tasks
    # (`let task = Task { await ... }`, `pendingTasks.insert(Task { ... })`,
    # `return Task { ... }`) never start at the line's indentation column.
    # Scoped to production sources so test helpers that build returned tasks
    # don't trip it.
    regex: '^[ \t]+Task\s*\{\s*await\s+self\??\.'
    included: ".*/(ButtonHeist|ButtonHeistCLI|ButtonHeistMCP)/Sources/.*\\.swift$"
    message: "Unstored `Task { await self.foo(...) }` from a callback fires and forgets — there is no handle, so `stop()` / teardown cannot cancel work in flight. Track the Task in a `Set<Task<Void, Never>>` and cancel on teardown, or refactor the callback to call the actor method directly."
    severity: warning

  # Known gap: bare `Task { await freeFunction() }` or `Task { await someActor.foo() }`
  # in callback bodies is not caught. Adding it produces too many false positives
  # on legitimate one-shot actor hops (`Task { await stakeout.noteScreenChange() }`
  # in TheGetaway, `Task { await getaway.broadcastIfChanged() }` in TheInsideJob).
  # The audit flagged these as 5.3 / 5.5 medium-severity — Wave 2b will track
  # them by hand. Revisit if a structural distinguishing feature emerges.

  agent_unannotated_callback:
    name: "Agent: callback without isolation annotation"
    # Match `var onFoo: ((...) -> Void)?` at any visibility. Post-#353 demotions,
    # the canonical onEvent/onSend/onTransition callbacks are `internal`, so the
    # rule covers them too — class-level isolation inference is not a substitute
    # for an explicit annotation in the closure type.
    regex: '\bvar\s+on\w+:\s*\(\([^)]*\)\s*->\s*Void\)\?'
    message: "`onFoo` callbacks must declare isolation in the closure type (e.g. `(@ButtonHeistActor (X) -> Void)?` or `@Sendable`). Class-level actor inference and docstring isolation both drift."
    severity: warning

  agent_no_task_detached:
    name: "Agent: Task.detached banned"
    # Match both `Task.detached(...)` and `Task.detached { ... }` (trailing closure).
    regex: 'Task\.detached\s*[({]'
    message: "Task.detached escapes the calling isolation context. Use Task { ... } (inherits caller isolation) or refactor to structured concurrency. If you genuinely need to escape isolation, document why with `// swiftlint:disable:next agent_no_task_detached` and a rationale comment."
    severity: error

  agent_wire_message_arm_no_op_break:
    name: "Agent: wire-message switch arm with bare `break`"
    # A `case .X: break` in a wire-message dispatch silently drops the message.
    # Recording bug #348's root cause was exactly this: a `.pong` arm broke
    # without flowing through `onEvent`. Scoped to the known wire-message
    # dispatch files so the rule has a meaningful denominator. Files outside
    # the include list are not checked — a future wire-dispatch site needs to
    # be added here when it lands.
    regex: 'case\s+\.[A-Za-z_][A-Za-z0-9_]*(?:\s*,\s*\.[A-Za-z_][A-Za-z0-9_]*)*\s*:[ \t]*\n[ \t]+break[ \t]*(?://[^\n]*)?\n'
    included: ".*(DeviceConnection|TheHandoff|SimpleSocketServer)\\.swift$"
    message: "Wire-message switch arms that `break` silently drop messages. Either flow the message through `onEvent` (or the equivalent dispatch), or annotate with `// swiftlint:disable:next agent_wire_message_arm_no_op_break` and explain who consumes this case elsewhere."
    severity: warning
